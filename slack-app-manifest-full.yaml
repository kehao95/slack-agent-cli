display_information:
  name: slack-agent-cli (Full Access)
  description: Slack for Non-Humans™ - Full read/write access
  background_color: "#2c2d30"
oauth_config:
  scopes:
    user:
      # Channel access (read, user perspective)
      - identify
      - channels:read
      - channels:history
      - channels:write
      - groups:read
      - groups:history
      - im:read
      - im:history
      - mpim:read
      - mpim:history

      # Messaging as the authenticated user.
      - chat:write

      # Users
      - users:read

      # Search
      - search:read

      # Reactions (add/remove)
      - reactions:read
      - reactions:write

      # Pins (pin/unpin)
      - pins:read
      - pins:write

      # Files (upload/download)
      - files:read
      - files:write

      # Emoji
      - emoji:read

    bot:
      # Channel access (read, bot perspective)
      - channels:read
      - channels:history
      - groups:read
      - groups:history
      - im:read
      - im:history
      - mpim:read
      - mpim:history

      # Messaging (send/edit/delete)
      - chat:write

      # Users
      - users:read

      # Reactions (add/remove)
      - reactions:read
      - reactions:write

      # Pins (pin/unpin)
      - pins:read
      - pins:write

      # Files (upload/download)
      - files:read
      - files:write

      # Emoji
      - emoji:read
settings:
  event_subscriptions:
    bot_events:
      # Subscribe to message events across all surfaces visible to the bot user.
      # Thread-related subtypes such as message_replied arrive under these.
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - message.app_home

      # Thread-adjacent activity that may matter for inbox/watch style flows.
      - reaction_added
      - reaction_removed
      - pin_added
      - pin_removed
  org_deploy_enabled: false
  socket_mode_enabled: true
  is_hosted: false
  token_rotation_enabled: false
